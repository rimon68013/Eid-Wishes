<!doctype html>
<html lang="en"> 
 <head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Eid Mubarak</title> 
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&amp;family=Cinzel+Decorative:wght@400;700&amp;family=Lato:wght@300;400&amp;display=swap" rel="stylesheet"> 
  <link rel="stylesheet" href="style.css"> 
 </head> 
 <body> 
  <canvas id="stars"></canvas> 
  <div id="lanterns"></div> 
  <canvas id="particles"></canvas> 
  <canvas id="fireworks"></canvas> 
  <div class="card"> 
   <div class="card-top"></div> 
   <div class="corners"> 
    <div class="corner corner-tl"></div> 
    <div class="corner corner-tr"></div> 
    <div class="corner corner-bl"></div> 
    <div class="corner corner-br"></div> 
   </div> 
   <div class="card-moon-area"> <!-- small star dots — appear with moon --> 
    <div class="star-dot" style="width:4px;height:4px;top:18px;left:22%;animation-delay:0.8s,1.5s"></div> 
    <div class="star-dot" style="width:3px;height:3px;top:28px;left:30%;animation-delay:0.9s,1.8s"></div> 
    <div class="star-dot" style="width:5px;height:5px;top:14px;right:24%;animation-delay:0.85s,1.6s"></div> 
    <div class="star-dot" style="width:3px;height:3px;top:35px;right:32%;animation-delay:1.0s,2.0s"></div> 
    <div class="star-dot" style="width:4px;height:4px;top:50px;left:14%;animation-delay:0.95s,1.7s"></div> 
    <div class="star-dot" style="width:3px;height:3px;top:55px;right:16%;animation-delay:1.05s,1.9s"></div> <!-- Crescent Moon SVG — proper mask, no black circle --> 
    <div class="moon-wrap"> 
     <svg width="100" height="100" viewbox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"> <defs> 
       <radialgradient id="moonGrad" cx="38%" cy="32%" r="68%"> 
        <stop offset="0%" stop-color="#fffad0" /> 
        <stop offset="40%" stop-color="#f5d040" /> 
        <stop offset="100%" stop-color="#a06010" /> 
       </radialgradient> 
       <mask id="crescentMask"> 
        <circle cx="44" cy="50" r="32" fill="white" /> 
        <circle cx="60" cy="42" r="26" fill="black" /> 
       </mask> 
      </defs> <circle cx="44" cy="50" r="32" fill="url(#moonGrad)" mask="url(#crescentMask)" /> <circle cx="44" cy="50" r="32" fill="none" stroke="rgba(255,245,180,0.25)" stroke-width="2" mask="url(#crescentMask)" /> <polygon points="76,18 78.8,26.5 88,26.5 80.6,31.8 83.4,40.5 76,35.2 68.6,40.5 71.4,31.8 64,26.5 73.2,26.5" fill="#f5d858" opacity="0.96" style="filter:drop-shadow(0 0 4px rgba(255,220,80,0.9))" /> 
     </svg> 
    </div> 
   </div> <!-- Arabic calligraphy --> 
   <div class="arabic">
     عِيدٌ مُبَارَكٌ 
   </div> 
   <div class="divider"> 
    <div class="divider-line"></div> 
    <div class="divider-diamond"></div> 
    <div class="divider-line"></div> 
   </div> 
   <h1 class="eid-title">Eid-ul-Fitr</h1> 
   <p class="eid-sub">M U B A R A K</p> 
   <div class="divider" style="animation-delay:2.1s"> 
    <div class="divider-line"></div> 
    <div class="divider-diamond"></div> 
    <div class="divider-diamond" style="width:5px;height:5px;opacity:0.5;margin:0 2px"></div> 
    <div class="divider-diamond"></div> 
    <div class="divider-line"></div> 
   </div> 
   <p class="message">May the blessings of Allah fill your life with happiness and open the doors of all your prayers. Wishing you and your family peace, joy and prosperity this blessed Eid. 🌙</p> <!-- Bottom SVG ornament --> 
   <div class="bottom-ornament"> 
    <svg width="220" height="32" viewbox="0 0 220 32" fill="none"> <path d="M10 16 Q55 2 110 16 Q165 30 210 16" stroke="rgba(201,168,76,0.5)" stroke-width="1" fill="none" /> <path d="M10 16 Q55 30 110 16 Q165 2 210 16" stroke="rgba(201,168,76,0.25)" stroke-width="1" fill="none" /> <circle cx="110" cy="16" r="4" fill="#c9a84c" opacity="0.8" /> <circle cx="10" cy="16" r="2.5" fill="#c9a84c" opacity="0.5" /> <circle cx="210" cy="16" r="2.5" fill="#c9a84c" opacity="0.5" /> <circle cx="60" cy="12" r="1.5" fill="#f0d080" opacity="0.6" /> <circle cx="160" cy="20" r="1.5" fill="#f0d080" opacity="0.6" /> 
    </svg> 
   </div> 
  </div> 
  <script src="script.js"></script> 
 </body>
</html>
